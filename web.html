<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Input</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f5f5f5;
            font-family:Arial, sans-serif;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.15);
            width:400px;
        }

        textarea{
            width:100%;
            height:200px;
            font-size:18px;
            padding:10px;
            resize:none;
            box-sizing:border-box;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>กรอกข้อความ</h2>

    <textarea placeholder="พิมพ์ข้อความที่นี่..."></textarea>

</div>

	<h1>Yooooo</h1>

</body>
</html>
